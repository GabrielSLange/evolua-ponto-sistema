server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip para velocidade
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript font/woff2;

    # Landing page do Evolua Ponto servida na raiz do subdominio app.
    # Mantem /login e as demais rotas do sistema apontando para o SPA atual.
    location = / {
        proxy_pass https://evolua-ponto-lp.vercel.app/;
        proxy_ssl_server_name on;
        proxy_set_header Host evolua-ponto-lp.vercel.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /assets/ {
        try_files $uri @landing_assets;
    }

    location @landing_assets {
        proxy_pass https://evolua-ponto-lp.vercel.app;
        proxy_ssl_server_name on;
        proxy_set_header Host evolua-ponto-lp.vercel.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /LoginAnimation.json {
        proxy_pass https://evolua-ponto-lp.vercel.app/LoginAnimation.json;
        proxy_ssl_server_name on;
        proxy_set_header Host evolua-ponto-lp.vercel.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Roteamento do React (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de arquivos estáticos e ícones (Isso conserta seus bugs de ícones!)
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|pdf)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}
