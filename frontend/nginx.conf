server {
    listen 80;
    server_name localhost;
    
    root /usr/share/nginx/html;
    index index.html;

    # Essa é a mágica: Tenta achar o arquivo ($uri), se não achar, tenta pasta, se não achar, manda pro index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Configuração opcional para garantir que o mime type do JS/CSS esteja certo
    include /etc/nginx/mime.types;

    # Opcional: Cache de assets estáticos para ficar rapidão
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public";
        access_log off;
    }
}